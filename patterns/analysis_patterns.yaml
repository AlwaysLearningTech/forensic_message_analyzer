# Default analysis patterns for forensic message analyzer
#
# These patterns are tuned to OVER-FLAG (high recall, low precision). False
# positives are expected; the manual-review phase removes them. The point is
# to surface every candidate worth a human look without requiring the human
# to read every message.
#
# EMPIRICAL FOUNDATION (cite when defending a flag on the stand)
# --------------------------------------------------------------
# Coercive-control framework:
#   Stark, E. (2007). Coercive Control: How Men Entrap Women in Personal
#       Life. Oxford University Press.
#       — Foundational text defining coercive control as a pattern of
#         intimidation, isolation, and micro-regulation of daily life.
#
# Typology of intimate-partner violence:
#   Johnson, M. P. (2008). A Typology of Domestic Violence: Intimate
#       Terrorism, Violent Resistance, and Situational Couple Violence.
#       Northeastern University Press.
#       — Distinguishes intimate terrorism (control-driven) from
#         situational couple violence; supports treating control,
#         isolation, and intimidation patterns as a coherent cluster.
#
# Post-separation control:
#   Hardesty, J. L., Crossman, K. A., Khaw, L., & Raffaelli, M. (2015).
#       Marital violence and coparenting quality after separation.
#       Journal of Family Psychology, 29(2), 320-330.
#       — Empirical basis for tracking control patterns specifically in
#         post-separation co-parenting communications.
#
# Digital coercive control:
#   Woodlock, D. (2017). The Abuse of Technology in Domestic Violence
#       and Stalking. Violence Against Women, 23(5), 584-602.
#       — Documents text-message stalking, monitoring, and harassment
#         as primary modalities of contemporary coercive control.
#   Dragiewicz, M. et al. (2018). Technology-facilitated coercive control:
#       domestic violence and the competing roles of digital media
#       platforms. Feminist Media Studies, 18(4), 609-625.
#
# Gaslighting / psychological abuse:
#   Sweet, P. L. (2019). The Sociology of Gaslighting. American
#       Sociological Review, 84(5), 851-875.
#       — Defines gaslighting through reality-denial linguistic patterns
#         (e.g., "that didn't happen", "you're imagining things") used to
#         construct the threat-pattern catalogue below.
#
# Lethality / risk assessment:
#   Campbell, J. C. (2003). Danger Assessment instrument; Campbell, J. C.
#       et al. (2003). Risk factors for femicide in abusive
#       relationships, American Journal of Public Health, 93(7),
#       1089-1097.
#       — Specific phrases ("kill you", "if I can't have you") are
#         empirically associated with elevated lethality risk.
#
# Stalking phraseology:
#   Logan, T. K. & Walker, R. (2017). Stalking: A Multidimensional
#       Framework for Assessment and Safety Planning. Trauma, Violence,
#       & Abuse, 18(2), 200-222.
#
# General forensic linguistic / pattern matching practice:
#   SWGDE Best Practices for Examination of Digital Evidence (2018+).
#   NIST SP 800-86, Guide to Integrating Forensic Techniques into
#       Incident Response.
#
# This file MAY be edited by hand to add, remove, or tighten patterns
# for a specific case. Document any case-specific changes in the
# examiner's notes and re-run the validator to confirm the changes
# parse correctly.

threat_patterns:
  # Direct physical-threat phrasing — see Campbell (2003) Danger
  # Assessment items 1, 4, 8 ("threats to kill", "threats with weapon",
  # "violent threats"). These items have the strongest empirical link to
  # lethality risk in intimate-partner contexts.
  - name: "Physical Threat"
    pattern: "\\b(kill you|hurt you|harm you|attack you|assault you|hit you|punch you|slap you|going to kill|going to hurt)\\b"
    severity: "high"
    confidence_boost: 0.3
    citation: "Campbell (2003); Campbell et al. (2003) AJPH 93(7):1089-1097"

  # Stalking phraseology per Logan & Walker (2017) — surveillance and
  # location-tracking language is a recognised stalking modality.
  - name: "Stalking Behavior"
    pattern: "\\b(following you|watching you|tracking you|know where you (live|are|work)|find you|i('m| am) watching)\\b"
    severity: "high"
    confidence_boost: 0.25
    citation: "Logan & Walker (2017) Trauma, Violence, & Abuse 18(2):200-222"

  # Harassment per Woodlock (2017) — repeated unwanted contact and
  # explicit refusal-to-disengage language.
  - name: "Harassment"
    pattern: "\\b(harassing|won't stop (calling|texting|messaging)|leave me alone|stop contacting)\\b"
    severity: "medium"
    confidence_boost: 0.2
    citation: "Woodlock (2017) Violence Against Women 23(5):584-602"

  # Intimidation per Stark (2007) Ch. 5 — fear-induction and
  # consequence-threat patterns are core to coercive control.
  - name: "Intimidation"
    pattern: "\\b(threatening|intimidate|scare you|you should be (afraid|scared)|there will be consequences|you'll regret)\\b"
    severity: "high"
    confidence_boost: 0.25
    citation: "Stark (2007) Coercive Control, Ch. 5"

  # Property destruction as proxy threat — Johnson (2008) intimate
  # terrorism; included on the Danger Assessment as item 5.
  - name: "Property Damage"
    pattern: "\\b(destroy your|damage your|break your|vandalize|ruin your|trash your)\\b"
    severity: "medium"
    confidence_boost: 0.2
    citation: "Johnson (2008) Typology, Ch. 2; Campbell DA item 5"

  # Coercion / extortion language — included in WA RCW 9A.36.070 and
  # similar criminal-coercion statutes in most jurisdictions.
  - name: "Extortion"
    pattern: "\\b(blackmail|extort|pay me or|expose you|reveal .+ unless)\\b"
    severity: "high"
    confidence_boost: 0.3
    citation: "RCW 9A.36.070 (and analogous state coercion statutes)"

behavioral_patterns:
  # Stark (2007) describes blame-shifting and fault-attribution as a
  # micro-regulation tactic; Sweet (2019) catalogues these phrases.
  emotional_manipulation:
    patterns:
      - "\\b(your fault|you made me|you forced me to|you deserve this|guilt trip)\\b"
    weight: 0.7
    description: "Emotional manipulation tactics"
    citation: "Stark (2007); Sweet (2019) ASR 84(5):851-875"

  # Gaslighting per Sweet (2019) — reality-denial as a sociological
  # phenomenon, not a clinical diagnosis. The three sub-patterns map to
  # Sweet's three categories: event denial, sanity attack, and memory
  # rewriting.
  gaslighting:
    patterns:
      - "\\b(i never said that|that didn't happen|you're imagining)\\b"
      - "\\b(you're crazy|you're paranoid|you're overreacting)\\b"
      - "\\b(you remember it wrong|you're confused|that's not what happened)\\b"
    weight: 0.9
    description: "Psychological manipulation"
    citation: "Sweet (2019) ASR 84(5):851-875"

  # Control language per Stark (2007) — micro-regulation of daily life
  # ("micro-management") is the defining feature of coercive control.
  control:
    patterns:
      - "\\b(you can't|i won't let you|i forbid|you're not allowed|you need my permission|you must)\\b"
    weight: 0.8
    description: "Controlling behavior"
    citation: "Stark (2007) Coercive Control, Ch. 6"

  # Isolation per Johnson (2008) — restricting access to support network
  # is a core intimate-terrorism tactic.
  isolation:
    patterns:
      - "\\b(don't talk to (them|him|her)|stay away from)\\b"
      - "\\b(no friends|you only need me)\\b"
      - "\\b(you don't need .+ friends|you shouldn't see (them|him|her))\\b"
    weight: 0.8
    description: "Attempts to isolate from support network"
    citation: "Johnson (2008) Typology, Ch. 3"

  # Love-bombing as control onset — see Strutzenberg et al. (2017),
  # "Love-bombing: A Narcissistic Approach to Relationship Formation",
  # Discovery: GA Tech Online Journal 1(1).
  love_bombing:
    patterns:
      - "\\b(i (love|adore|worship) you so much|obsessed with you)\\b"
      - "\\b(you're (perfect|the best thing|my everything|my world))\\b"
      - "\\b(can't live without you|need you|you're the only one|my soulmate)\\b"
    weight: 0.7
    description: "Excessive affection or attention"
    citation: "Strutzenberg et al. (2017); see also Stark (2007) Ch. 4 on idealisation"

sentiment_keywords:
  positive:
    - "love"
    - "happy"
    - "grateful"
    - "appreciate"
    - "wonderful"
    - "great"
    - "thank"

  negative:
    - "hate"
    - "angry"
    - "upset"
    - "frustrated"
    - "terrible"
    - "awful"
    - "disgusting"

  neutral:
    - "okay"
    - "fine"
    - "alright"
    - "maybe"
    - "perhaps"

escalation_indicators:
  - name: "Frequency Increase"
    type: "temporal"
    threshold: 2.0  # 2x normal frequency

  - name: "Emotional Intensity"
    type: "sentiment"
    threshold: -0.7  # Very negative sentiment

  - name: "Threat Escalation"
    type: "content"
    pattern: "\\b(i will|i'm going to|i promise|i swear) .+ (hurt|kill|destroy|ruin)\\b"

  - name: "Urgency Markers"
    type: "content"
    pattern: "\\b(do it now|right now|immediately|tonight or else|right away or)\\b"

context_flags:
  legal:
    - "custody"
    - "court"
    - "lawyer"
    - "judge"
    - "divorce"
    - "restraining order"
    - "police"

  family:
    - "children"
    - "kids"
    - "daughter"
    - "son"
    - "parent"
    - "mother"
    - "father"

  financial:
    - "money"
    - "pay"
    - "owe"
    - "debt"
    - "account"
    - "bank"
    - "credit"